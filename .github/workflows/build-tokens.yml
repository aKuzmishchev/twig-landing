name: Build Design Tokens

on:
  push:
    branches: [main, tokens]
    paths:
      - 'tokens/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tokens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Commit generated CSS/JS
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: rebuild design tokens [skip ci]'
          file_pattern: 'src/tokens/*.css src/tokens/*.js'

      - name: Open PR to main
        if: github.ref == 'refs/heads/tokens'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: tokens
          title: 'design: update tokens from Figma'
          body: |
            Automated PR from Token Studio (Figma).

            Changes in `tokens/tokens.json` → rebuilt `src/tokens/tokens.css` and `src/tokens/tokens.js`.

            Review token changes before merging to main.
          labels: design-tokens
