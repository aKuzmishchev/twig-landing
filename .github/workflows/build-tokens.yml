name: Build Design Tokens

on:
  push:
    branches: [main, tokens]
    paths:
      - 'tokens/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Open PR to main
        if: github.ref == 'refs/heads/tokens'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head tokens --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head tokens \
              --title "design: update tokens from Figma" \
              --body "Automated PR from Token Studio (Figma).

          Changes in \`tokens/tokens.json\` → rebuilt \`src/tokens/tokens.css\` and \`src/tokens/tokens.js\`.

          Review token changes before merging to main."
          else
            echo "PR #$EXISTING already open, skipping."
          fi
